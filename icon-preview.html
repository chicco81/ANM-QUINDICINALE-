<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:30px;font-family:sans-serif;}
.preview{display:flex;gap:30px;align-items:center;flex-wrap:wrap;justify-content:center;}
.icon-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;color:#888;font-size:12px;}
svg{border-radius:22%;box-shadow:0 8px 32px rgba(0,0,0,.5);}
h2{color:#f5a623;font-size:14px;margin:0;}
</style>
</head>
<body>
<div class="preview">

  <!-- OPZIONE A -->
  <div class="icon-wrap">
    <h2>A — Scudo moderno</h2>
    <svg width="120" height="120" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="96" fill="#0d0d1a"/>
      <!-- Scudo -->
      <path d="M256 60 L420 130 L420 290 Q420 400 256 460 Q92 400 92 290 L92 130 Z" fill="#f5a623"/>
      <path d="M256 90 L395 152 L395 288 Q395 382 256 432 Q117 382 117 288 L117 152 Z" fill="#e8951a"/>
      <!-- Banda centrale -->
      <rect x="117" y="210" width="278" height="90" rx="0" fill="#0d0d1a"/>
      <!-- ANM -->
      <text x="256" y="275" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="72" font-weight="900" fill="#f5a623" letter-spacing="-1">ANM</text>
      <!-- Stelline -->
      <circle cx="196" cy="330" r="8" fill="#0d0d1a"/>
      <circle cx="256" cy="330" r="8" fill="#0d0d1a"/>
      <circle cx="316" cy="330" r="8" fill="#0d0d1a"/>
    </svg>
    <span>512×512</span>
  </div>

  <!-- OPZIONE B -->
  <div class="icon-wrap">
    <h2>B — Monogramma AT</h2>
    <svg width="120" height="120" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="96" fill="#0d0d1a"/>
      <circle cx="256" cy="256" r="190" fill="none" stroke="#f5a623" stroke-width="18"/>
      <text x="256" y="210" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="80" font-weight="900" fill="#f5a623">ANM</text>
      <text x="256" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#888" letter-spacing="8">TURNI</text>
      <line x1="136" y1="240" x2="376" y2="240" stroke="#f5a623" stroke-width="3" opacity="0.4"/>
    </svg>
    <span>512×512</span>
  </div>

  <!-- OPZIONE C -->
  <div class="icon-wrap">
    <h2>C — Bold minimal</h2>
    <svg width="120" height="120" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="96" fill="#f5a623"/>
      <text x="256" y="290" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="180" font-weight="900" fill="#0d0d1a" letter-spacing="-6">ANM</text>
      <rect x="80" y="320" width="352" height="6" rx="3" fill="#0d0d1a" opacity="0.4"/>
      <text x="256" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" font-weight="700" fill="#0d0d1a" letter-spacing="10" opacity="0.7">TURNI</text>
    </svg>
    <span>512×512</span>
  </div>

  <!-- OPZIONE D -->
  <div class="icon-wrap">
    <h2>D — Bus + ANM</h2>
    <svg width="120" height="120" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="96" fill="#0d0d1a"/>
      <text x="256" y="190" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="110" font-weight="900" fill="#f5a623" letter-spacing="-3">ANM</text>
      <rect x="80" y="215" width="352" height="3" rx="2" fill="#f5a623" opacity="0.3"/>
      <!-- Bus semplificato -->
      <rect x="90" y="240" width="332" height="150" rx="20" fill="#f5a623"/>
      <rect x="108" y="258" width="70" height="55" rx="8" fill="#0d0d1a"/>
      <rect x="198" y="258" width="70" height="55" rx="8" fill="#0d0d1a"/>
      <rect x="288" y="258" width="70" height="55" rx="8" fill="#0d0d1a"/>
      <rect x="358" y="258" width="44" height="55" rx="8" fill="#0d0d1a" opacity="0.5"/>
      <circle cx="160" cy="400" r="28" fill="#0d0d1a"/>
      <circle cx="160" cy="400" r="12" fill="#f5a623"/>
      <circle cx="352" cy="400" r="28" fill="#0d0d1a"/>
      <circle cx="352" cy="400" r="12" fill="#f5a623"/>
    </svg>
    <span>512×512</span>
  </div>

</div>

<p style="color:#555;font-size:13px;margin-top:10px;">Dimmi quale lettera preferisci (A, B, C o D)</p>
</body>
</html>
