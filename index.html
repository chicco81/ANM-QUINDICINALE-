<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#f5a623"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ANM Turni"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>ANM Turni</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#16161f;--bg4:#1c1c28;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--txt:#e8e8f0;--txt2:#8888a0;--txt3:#4a4a60;--anm:#f5a623;--anm2:#e8951a;--anm-dim:rgba(245,166,35,.12);--blue:#4f8ef7;--blue-dim:rgba(79,142,247,.12);--green:#3ecf8e;--green-dim:rgba(62,207,142,.12);--red:#f75f5f;--red-dim:rgba(247,95,95,.1);--r:12px;--r2:8px;}
body.light{--bg:#f4f4f8;--bg2:#ffffff;--bg3:#f0f0f5;--bg4:#e8e8f0;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);--txt:#111120;--txt2:#5a5a70;--txt3:#9a9ab0;--anm:#e8951a;--anm2:#d4820e;--anm-dim:rgba(232,149,26,.12);--blue:#2d6fdd;--blue-dim:rgba(45,111,221,.1);--green:#1fa86e;--green-dim:rgba(31,168,110,.1);--red:#d94040;--red-dim:rgba(217,64,64,.08);}
html,body{height:100%;background:var(--bg);overflow:hidden}body{font-family:'DM Sans',sans-serif;color:var(--txt)}#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;gap:12px;height:calc(54px + env(safe-area-inset-top,0px))}
.logo-badge{background:var(--anm);color:#0a0a0f;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.5px;flex-shrink:0}
.hdr-spacer{flex:1}
.hdr-count{background:var(--anm-dim);border:1px solid rgba(245,166,35,.25);color:var(--anm);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;font-family:'Space Mono',monospace}
.btabs{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);align-items:stretch}
.btab{flex:1;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;position:relative;min-width:0}
.btab-ic{font-size:17px}.btab-lbl{font-size:8px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.btab.on .btab-lbl{color:var(--anm)}.btab-dot{position:absolute;top:7px;right:calc(50% - 12px);width:5px;height:5px;border-radius:50%;background:var(--red)}
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}.pad{padding:14px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0 12px;margin-bottom:12px}
.search-ic{font-size:13px;color:var(--txt3);flex-shrink:0}
.search-inp{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 0}
.search-inp::placeholder{color:var(--txt3)}
.chips{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--txt3);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.chip.on{background:var(--anm-dim);border-color:rgba(245,166,35,.4);color:var(--anm)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center}
.stat-val{font-size:20px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:-1px}.stat-lbl{font-size:8px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--anm-dim);border:1px dashed rgba(245,166,35,.4);border-radius:var(--r);padding:13px;color:var(--anm);font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:12px}
.add-btn:active{background:rgba(245,166,35,.2)}
.driver-list{display:flex;flex-direction:column;gap:6px}
.driver-row{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;cursor:pointer;position:relative;overflow:hidden}
.driver-row:active{background:var(--bg4)}.driver-row.pending{border-color:rgba(247,95,95,.3);background:rgba(247,95,95,.04)}
.driver-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
.driver-row.anm::before{background:var(--blue)}.driver-row.int::before{background:var(--anm)}
.d-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;font-family:'Space Mono',monospace}
.d-info{flex:1;min-width:0}.d-name{font-size:13px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-meta{display:flex;align-items:center;gap:6px;margin-top:2px;overflow:hidden}
.d-mat{font-size:10px;color:var(--txt3);font-family:'Space Mono',monospace;flex-shrink:0}
.d-tipo{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;border:1px solid;flex-shrink:0}
.d-turni{font-size:10px;color:var(--txt2);flex-shrink:0}.d-pending{background:var(--red-dim);border:1px solid rgba(247,95,95,.3);color:var(--red);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;font-family:'Space Mono',monospace;flex-shrink:0}
.d-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.d-pdf-chip{background:var(--anm-dim);border:1px solid rgba(245,166,35,.35);color:var(--anm);font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;font-family:'Space Mono',monospace}
.d-chevron{color:var(--txt3);font-size:13px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);z-index:400;display:flex;align-items:flex-end}
.modal{background:var(--bg2);border-top:1px solid var(--border2);border-radius:22px 22px 0 0;padding:20px 16px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));width:100%;max-height:88vh;overflow-y:auto}
.modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--txt)}
.fg{margin-bottom:11px}.lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.inp{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%}
.inp:focus{border-color:var(--anm)}.inp::placeholder{color:var(--txt3)}
.tipo-btns{display:flex;gap:6px}
.tipo-btn{flex:1;padding:9px;border-radius:var(--r2);border:1px solid var(--border2);background:var(--bg4);color:var(--txt3);font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif}
.tipo-btn.on-anm{border-color:rgba(79,142,247,.5);background:var(--blue-dim);color:var(--blue)}
.tipo-btn.on-int{border-color:rgba(245,166,35,.5);background:var(--anm-dim);color:var(--anm)}
.btn-primary{background:linear-gradient(135deg,var(--anm),var(--anm2));border:none;color:#0a0a0f;padding:13px;border-radius:var(--r2);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:800;font-size:14px;width:100%}
.btn-primary:disabled{opacity:.3;cursor:default}.btn-ghost{background:var(--bg4);border:1px solid var(--border2);color:var(--txt2);padding:11px;border-radius:var(--r2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;width:100%}
.btn-danger-sm{background:none;border:none;color:var(--red);font-size:11px;cursor:pointer;padding:3px 6px;font-family:'DM Sans',sans-serif;font-weight:700}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:8px 18px;font-size:12px;font-weight:700;color:var(--txt);z-index:500;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.dd-back-hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;padding-top:env(safe-area-inset-top,0px);height:calc(54px + env(safe-area-inset-top,0px));display:flex;align-items:center;gap:10px}
.dd-back-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.dd-name-hdr{font-size:14px;font-weight:700;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.dd-subtabs{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 12px;gap:2px;overflow-x:auto}.dd-subtabs::-webkit-scrollbar{display:none}
.dd-tab{flex-shrink:0;padding:12px 14px 10px;font-size:11px;font-weight:700;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.dd-tab.on{color:var(--anm);border-bottom-color:var(--anm)}
.quind-card{background:linear-gradient(135deg,rgba(245,166,35,.15),rgba(245,166,35,.05));border:1.5px solid rgba(245,166,35,.45);border-radius:var(--r);padding:20px 16px;margin-bottom:14px}
.quind-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.quind-icon-wrap{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--anm),var(--anm2));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 4px 16px rgba(245,166,35,.35)}
.quind-title{font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-.3px}.quind-sub{font-size:11px;color:var(--txt3);margin-top:3px;line-height:1.4}
.quind-upload-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,var(--anm),var(--anm2));border:none;border-radius:var(--r2);padding:15px;color:#0a0a0f;font-family:'DM Sans',sans-serif;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 14px rgba(245,166,35,.3)}
.quind-upload-btn:active{opacity:.85}.quind-upload-btn:disabled{opacity:.4;cursor:default}
.quind-status{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:var(--r2);padding:10px 12px;margin-top:10px;border:1px solid var(--border)}
.quind-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.quind-status-txt{font-size:12px;color:var(--txt2);font-weight:600}
.quind-status-count{font-size:11px;color:var(--txt3);margin-left:auto;font-family:'Space Mono',monospace}
.preview-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.preview-hdr{padding:10px 14px;background:var(--bg4);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.preview-hdr-title{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.6px}
.preview-hdr-count{font-size:10px;color:var(--txt3);font-family:'Space Mono',monospace}
.prev-row{display:flex;align-items:center;gap:9px;padding:7px 14px;border-bottom:1px solid var(--border)}
.prev-row:last-child{border-bottom:none}
.prev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.prev-date{font-size:10px;font-family:'Space Mono',monospace;color:var(--txt2);font-weight:700;min-width:54px;flex-shrink:0}
.prev-tipo{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0}.prev-info{flex:1;font-size:11px;color:var(--txt);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prev-time{font-size:9px;color:var(--txt3);font-family:'Space Mono',monospace;margin-left:auto;flex-shrink:0}
.cal-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg4);border-bottom:1px solid var(--border)}
.cal-nav-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.cal-nav-info{text-align:center}.cal-nav-month{font-size:14px;font-weight:700;color:var(--txt)}.cal-nav-year{font-size:10px;color:var(--txt3);font-family:'Space Mono',monospace}
.cal-dh{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.cal-dh-cell{text-align:center;font-size:9px;font-weight:700;color:var(--txt3);padding:5px 0;letter-spacing:.8px;text-transform:uppercase;font-family:'Space Mono',monospace}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.c-day{border-radius:10px;min-height:74px;display:flex;flex-direction:column;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden;transition:transform .12s;user-select:none}
.c-day:active{transform:scale(.91)}.c-day.today{box-shadow:0 0 0 2px var(--anm)}
.c-day-num{font-size:10px;font-family:'Space Mono',monospace;color:var(--txt3);font-weight:600;padding:4px 5px 2px;line-height:1;align-self:flex-start}
.c-day-num.t{color:var(--anm);font-weight:800}
.c-day-num.sun{color:#ec4899;font-weight:800}
.c-day-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px 3px 5px}
.c-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.c-label{font-size:9px;font-weight:900;text-align:center;width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;letter-spacing:.4px;text-transform:uppercase;padding:0 2px;margin-top:1px}
.c-time{font-size:8px;font-family:'Space Mono',monospace;font-weight:700;opacity:.7}
/* ── PANNELLO GIORNO (slide-up dal basso, identico all'immagine) ── */
.dpanel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:180;backdrop-filter:blur(4px)}
.dpanel{position:fixed;bottom:0;left:0;right:0;z-index:190;background:var(--bg3);border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));box-shadow:0 -8px 40px rgba(0,0,0,.6)}
.dpanel-hero{padding:22px 20px 16px;display:flex;align-items:center;gap:16px;border-radius:22px 22px 0 0}
.dpanel-icon-box{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.dpanel-title{font-size:26px;font-weight:800;letter-spacing:-.6px;line-height:1.1}
.dpanel-subtitle{font-size:13px;font-weight:700;margin-top:4px;opacity:.85;display:flex;align-items:center;gap:6px}
.dpanel-date{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;opacity:.55;margin-bottom:6px}
.dpanel-body{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.dpanel-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border-radius:12px;padding:13px 15px}
.dpanel-row-ic{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.dpanel-row-lbl{font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.dpanel-row-val{font-size:17px;font-weight:800;font-family:'Space Mono',monospace;letter-spacing:-.3px}
/* Sezione vetture */
.dp-section{background:rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.dp-section-lbl{font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.dp-chip-row{display:flex;flex-wrap:wrap;gap:6px}
.dp-chip{display:flex;align-items:center;gap:6px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.35);border-radius:8px;padding:6px 10px}
.dp-chip-num{font-family:'Space Mono',monospace;font-size:15px;font-weight:800;color:var(--anm);letter-spacing:.5px}
.dp-chip-del{background:none;border:none;color:rgba(245,166,35,.6);cursor:pointer;font-size:15px;padding:0;line-height:1}
.dp-chip-sae{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);border-radius:8px;padding:6px 10px}
.dp-chip-sae .dp-chip-num{color:#A5B4FC}
.dp-chip-sae .dp-chip-del{color:rgba(165,180,252,.6)}
.dp-add-row{display:flex;gap:8px;align-items:center}
.dp-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:9px;outline:none;color:var(--txt);font-family:'Space Mono',monospace;font-size:15px;font-weight:700;letter-spacing:1px;padding:9px 12px}
.dp-inp:focus{border-color:var(--anm)}
.dp-add-btn{background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.4);color:var(--anm);padding:9px 14px;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:800;font-size:14px;white-space:nowrap}
.dp-add-btn-sae{background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.4);color:#A5B4FC;padding:9px 14px;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:800;font-size:14px;white-space:nowrap}
/* Pulsanti azione in fondo */
.dpanel-btns{display:flex;gap:10px;padding:4px 16px 0}
.dpanel-btn-cambia{flex:1;background:linear-gradient(135deg,#FF6B35,#FF3CAC);border:none;color:white;padding:14px;border-radius:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:800;font-size:15px}
.dpanel-btn-rimuovi{background:rgba(247,95,95,.12);border:1px solid rgba(247,95,95,.3);color:var(--red);padding:14px 16px;border-radius:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
.dpanel-btn-close{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--txt2);padding:14px 14px;border-radius:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px}
/* ── SPICKER (aperto dopo "Cambia turno") ── */
.spicker{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--anm);padding:14px 14px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));z-index:200;max-height:75vh;overflow-y:auto}
.spicker-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.spicker-date{font-size:13px;font-weight:700;color:var(--txt)}
.spicker-close{background:var(--bg4);border:1px solid var(--border2);border-radius:7px;width:28px;height:28px;cursor:pointer;color:var(--txt3);font-size:13px;display:flex;align-items:center;justify-content:center}
.spicker-pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px}.spicker-pills::-webkit-scrollbar{display:none}

.spill:active{transform:scale(.88)}

.cambio-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}

function initDrivers(){
  // v5 = nomi corretti (Title Case senza inversione)
  const savedV5=LS.get("anm_drivers_v5");
  if(savedV5&&Array.isArray(savedV5)&&savedV5.length>0) return savedV5;

  // Crea lista base con nomi corretti
  const base=AUTISTI_DEFAULT.map(a=>({...a}));

  // Prova a migrare turni/cambi da v4 o v3
  ['anm_drivers_v4','anm_drivers_v3'].forEach(key=>{
    try{
      const old=LS.get(key);
      if(old&&Array.isArray(old)){
        old.forEach(od=>{
          const found=base.find(b=>b.id===od.id||b.mat===od.mat);
          if(found){
            if(od.shifts&&Object.keys(od.shifts).length>0) found.shifts=od.shifts;
            if(od.custom&&od.custom.length>0) found.custom=od.custom;
            if(od.cambi&&od.cambi.length>0) found.cambi=od.cambi;
            // Aggiorna mat/tipo se modificato dall'utente
            if(od.mat&&od.mat!==found.mat) found.mat=od.mat;
            if(od.tipo&&od.tipo!==found.tipo) found.tipo=od.tipo;
          }
        });
        return; // usa solo la prima versione trovata
      }
    }catch(e){}
  });

  return base;
}

function useToast(){
  const [t,setT]=useState({msg:"",on:false});
  const ref=useRef();
  const fire=useCallback(msg=>{setT({msg,on:true});clearTimeout(ref.current);ref.current=setTimeout(()=>setT(p=>({...p,on:false})),2500);},[]);
  return [t,fire];
}

// PDF PARSE
function loadPdfJs(){
  return new Promise((res,rej)=>{
    if(window.pdfjsLib){res(window.pdfjsLib);return;}
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res(window.pdfjsLib);};
    s.onerror=()=>rej(new Error("Impossibile caricare pdf.js"));
    document.head.appendChild(s);
  });
}
function calcEnd(pres,durata){
  try{
    const[ph,pm]=pres.split(":").map(Number),[dh,dm]=durata.split(":").map(Number);
    const tot=(ph*60+pm)+(dh*60+dm);
    return`${String(Math.floor(tot/60)%24).padStart(2,"0")}:${String(tot%60).padStart(2,"0")}`;
  }catch(e){return "";}
}
const isTime=s=>/^\d{2}:\d{2}$/.test(s)&&parseInt(s.split(":")[0])<=23&&parseInt(s.split(":")[1])<=59;

function parseANM(items){
  const dateRe=/^(\d{2})\/(\d{2})\/(\d{4})$/;
  const SKIP=new Set(["INTERI","LUN","MAR","MER","GIO","VEN","SAB","DOM","DEP","LINEA","PGM"]);

  return items
    .filter(it=>it.x>=30&&it.x<=130&&dateRe.test(it.str)&&it.y>30&&it.y<760)
    .map(anchor=>{
      const dm=anchor.str.match(dateRe);
      const day=parseInt(dm[1]),month=parseInt(dm[2])-1,year=parseInt(dm[3]);
      // Riga: tutti gli item con y entro ±5px, ordinati per x
      const row=items.filter(it=>Math.abs(it.y-anchor.y)<=5.0).sort((a,b)=>a.x-b.x);
      const rowStr=row.map(i=>i.str).join(" ").toUpperCase();

      // Tipo turno
      let tipo="servizio";
      if(/RIPOSO\s+COMPENSATIVO|RIP\.?\s*COMP/i.test(rowStr))      tipo="riposo_comp";
      else if(/\bRIPOSO\b/.test(rowStr))                            tipo="riposo";
      else if(/\bFERIE\b/.test(rowStr))                             tipo="ferie";
      else if(/\bMALATTIA\b/.test(rowStr))                          tipo="malattia";
      else if(/\bPERMESSO\b/.test(rowStr))                          tipo="permesso";
      else if(/\bFESTIVO\b/.test(rowStr))                           tipo="festivo";
      else if(/SPEZZATO\s+APERTURA|SPEZZ?\.?\s*AP\b/.test(rowStr)) tipo="spezzato_ap";
      else if(/SPEZZATO\s+CHIUSURA|SPEZZ?\.?\s*CH\b/.test(rowStr)) tipo="spezzato_ch";
      else if(/\bSPEZZATO\b/.test(rowStr))                          tipo="spezzato_ap";
      else if(/DISP[OI]?\.\s*MATT|DISPONIB.*MATT/.test(rowStr))    tipo="disp_mattina";
      else if(/DISP[OI]?\.\s*SER|DISPONIB.*SERAL/.test(rowStr))    tipo="disp_serale";
      else if(/DISP[OI]?\.\s*NOT|DISPONIB.*NOTTUR/.test(rowStr))   tipo="disp_notturna";
      else if(/\bDISP\b/.test(rowStr))                              tipo="disp_mattina";

      // Tutti gli orari nella riga in ordine X
      const times=row.filter(it=>isTime(it.str));

      // Testi non-orario non-data → linea, località monto e tipo smonto
      let linea="",loc="",smontoDep="";
      row.forEach(it=>{
        const s=it.str.trim();
        if(!s||isTime(s)||dateRe.test(s)||/^\d+$/.test(s)) return;
        if(SKIP.has(s.toUpperCase())) return;
        if(s.length<2) return;
        // "Dep" o "Linea" nella colonna smonto (posizione X alta, verso destra)
        if(/^(DEP|DEP\.|LINEA)$/i.test(s)&&it.x>350){
          // Salva esattamente come nel PDF: "Dep" o "Linea"
          smontoDep=s;
          return;
        }
        if(it.x>=100&&it.x<=240&&!linea) linea=s;
        else if(it.x>200&&it.x<=320&&!loc&&s!==linea) loc=s;
      });

      // Salva loc esattamente come nel PDF — nessuna traduzione
      const locNome=loc;

      // Estrai presentazione e smonto in modo robusto
      // Logica: nel quindicinale ANM ci sono tipicamente 2-4 orari per riga:
      // [uscita-veicolo] [presentazione-deposito] ... [smonto-assoluto | durata]
      let pres="",fine="";

      if(times.length===0){
        // niente orari — ok per riposo/ferie/ecc
      } else if(times.length===1){
        pres=times[0].str;
      } else {
        // Con 2+ orari: il primo è l'uscita/inizio, l'ultimo candidato è smonto o durata
        // La presentazione è di solito il 2° orario (dopo l'uscita del mezzo)
        // ma se solo 2, il 1° è pres e il 2° è smonto o durata
        if(times.length===2){
          pres=times[0].str;
          const cand=times[1].str;
          // Se il candidato sommato alla pres dà un risultato < 24h con turno 1-14h → è durata
          const[ph,pm]=pres.split(":").map(Number);
          const[ch,cm]=cand.split(":").map(Number);
          const diffAbs=((ch*60+cm)-(ph*60+pm)+1440)%1440; // differenza come se fosse smonto assoluto
          const sommato=calcEnd(pres,cand); // come se fosse durata
          // Se la diff è 1–14h è uno smonto assoluto sensato
          if(diffAbs>=60&&diffAbs<=840) fine=cand;  // orario smonto assoluto
          else fine=sommato;                          // era durata → calcola smonto
        } else {
          // 3+ orari: pres = penultimo, smonto = ultimo (entrambi nella zona dx della riga)
          pres=times[times.length-2]?.str||times[0].str;
          const cand=times[times.length-1].str;
          const[ph,pm]=pres.split(":").map(Number);
          const[ch,cm]=cand.split(":").map(Number);
          const diffAbs=((ch*60+cm)-(ph*60+pm)+1440)%1440;
          if(diffAbs>=60&&diffAbs<=840) fine=cand;
          else fine=calcEnd(pres,cand);
        }
      }

      return{day,month,year,tipo,linea,pres,fine,loc:locNome,smontoDep};
    });
}

async function parsePDF(file){
  const pdfjs=await loadPdfJs(),buf=await file.arrayBuffer();
  const pdf=await pdfjs.getDocument({data:new Uint8Array(buf)}).promise,items=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p),vp=page.getViewport({scale:1}),c=await page.getTextContent();
    c.items.forEach(item=>{
      const str=item.str.trim();
      if(!str)return;
      items.push({x:Math.round(item.transform[4]*10)/10,y:Math.round((vp.height-item.transform[5])*10)/10,str});
    });
  }
  return parseANM(items);
}
function rowsToShifts(rows){
  // Mappa tipo stringa → id PRESET_SHIFTS e attributi grafici
  const TIPO_DEF={
    riposo:        {id:"riposo",        label:"Riposo",          icon:"🛌", color:"#10B981"},
    riposo_comp:   {id:"riposo_comp",   label:"Rip.Compensativo",icon:"💤", color:"#059669"},
    ferie:         {id:"ferie",         label:"Ferie",           icon:"🏖️", color:"#EC4899"},
    malattia:      {id:"malattia",      label:"Malattia",        icon:"🏥", color:"#EF4444"},
    permesso:      {id:"permesso",      label:"Permesso",        icon:"📝", color:"#6366F1"},
    festivo:       {id:"festivo",       label:"Festivo",         icon:"🎉", color:"#D946EF"},
    spezzato_ap:   {id:"spezzato_ap",   label:"Spez.Apertura",   icon:"🔀", color:"#F97316"},
    spezzato_ch:   {id:"spezzato_ch",   label:"Spez.Chiusura",   icon:"🔁", color:"#FB923C"},
    disp_mattina:  {id:"disp_mattina",  label:"Disp.Mattina",    icon:"📋", color:"#EAB308"},
    disp_serale:   {id:"disp_serale",   label:"Disp.Serale",     icon:"📋", color:"#A78BFA"},
    disp_notturna: {id:"disp_notturna", label:"Disp.Notturna",   icon:"📋", color:"#7C3AED"},
  };
  const shifts={},custom=[];
  rows.forEach(row=>{
    const key=dk(row.year,row.month,row.day);
    const noteParts=[];
    if(row.linea)     noteParts.push("Linea: "+row.linea);
    if(row.loc)       noteParts.push("LocMonto: "+row.loc);
    if(row.smontoDep) noteParts.push("TipoSmonto: "+row.smontoDep);
    if(row.pres)      noteParts.push("Pres: "+row.pres);
    if(row.fine)      noteParts.push("Fine: "+row.fine);
    const note=noteParts.join(" · ");

    if(row.tipo==="servizio"&&row.pres){
      // Servizio normale: determina mattina/sera dal orario presentazione
      const[ph,pm]=row.pres.split(":").map(Number);
      const pmin=ph*60+pm;
      const isMat=pmin>=240&&pmin<=960;  // 04:00–16:00 = mattina
      const isSer=pmin>960&&pmin<1320;   // 16:00–22:00 = pomeriggio/sera
      const icon=isMat?"🌅":isSer?"☀️":"🌙";
      const color=isMat?"#F59E0B":isSer?"#3B82F6":"#8B5CF6";
      const cid="anm_"+row.year+"_"+(row.month+1)+"_"+row.day+"_"+(row.linea||"srv");
      // Evita duplicati
      if(!custom.find(c=>c.id===cid)){
        custom.push({id:cid,label:row.linea||"Servizio",icon,color,start:row.pres,end:row.fine,linea:row.linea||""});
      }
      shifts[key]={shiftId:cid,note};

    } else if(row.tipo in TIPO_DEF){
      const def=TIPO_DEF[row.tipo];
      // Per spezzati e disponibilità con orario: crea turno custom con orario reale
      if(row.pres&&(row.tipo.startsWith("spezzato")||row.tipo.startsWith("disp"))){
        const cid="anm_"+row.tipo+"_"+row.year+"_"+(row.month+1)+"_"+row.day;
        if(!custom.find(c=>c.id===cid)){
          custom.push({id:cid,label:def.label,icon:def.icon,color:def.color,start:row.pres,end:row.fine||"",linea:row.linea||""});
        }
        shifts[key]={shiftId:cid,note};
      } else {
        // Riposo, ferie, malattia, permesso, festivo: usa id preset direttamente
        shifts[key]={shiftId:def.id,note};
      }
    } else {
      // Fallback: servizio senza orario → usa mattina
      shifts[key]={shiftId:"mattina",note};
    }
  });
  return{shifts,custom};
}

function DriverDetail({driver,onBack,onUpdate,fire}){

  const [saeCodes,setSaeCodes]=useState([]);

  const [fotoMsg,setFotoMsg]=useState("");

  const allShifts=[...PRESET_SHIFTS,...(driver.custom||[])];

  function chMonth(d){setMo(m=>{let n=m+d;if(n>11){setYr(y=>y+1);return 0;}if(n<0){setYr(y=>y-1);return 11;}return n;});}

  // Apre il pannello giorno
  function openDay(d,key,shift,data){
    // Carica vetture e SAE dal campo note
    const note=data?.note||"";
    const vets=(note.match(/Vettura:\s*([\w]+)/g)||[]).map(v=>v.replace(/Vettura:\s*/,""));
    const saes=(note.match(/SAE:\s*([\w]+)/g)||[]).map(s=>s.replace(/SAE:\s*/,""));
    setVetture(vets);setSaeCodes(saes);setVetturaInp("");setSaeInp("");
    setDayPanel({d,key,shift,data});setShowSpicker(false);
  }
  function closePanel(){setDayPanel(null);setShowSpicker(false);}

  // Costruisce la nota con vetture e SAE
  function buildNote(base,vets,saes){
    let note=(base||"").replace(/( \| )?Vettura:\s*[\w]+/g,"").replace(/( \| )?SAE:\s*[\w]+/g,"").trim();
    const parts=[...vets.map(v=>"Vettura: "+v),...saes.map(s=>"SAE: "+s)];
    return parts.length?(note?note+" | "+parts.join(" | "):parts.join(" | ")):note;
  }
  function saveVetSae(vets,saes){
    if(!dayPanel)return;
    const existing=driver.shifts[dayPanel.key]||{shiftId:"mattina",note:""};
    const newNote=buildNote(existing.note,vets,saes);
    onUpdate({...driver,shifts:{...driver.shifts,[dayPanel.key]:{...existing,note:newNote}}});
  }
  function addVettura(){
    const v=vetturaInp.trim().toUpperCase();if(!v)return;
    if(vetture.includes(v)){fire("Vettura già presente");return;}
    const nuove=[...vetture,v];setVetture(nuove);setVetturaInp("");
    saveVetSae(nuove,saeCodes);fire("🚍 "+v+" aggiunta!");
  }
  function removeVettura(v){
    const nuove=vetture.filter(x=>x!==v);setVetture(nuove);saveVetSae(nuove,saeCodes);fire("Vettura rimossa");
  }
  function addSae(){
    const s=saeInp.trim().toUpperCase();if(!s)return;
    if(saeCodes.includes(s)){fire("SAE già presente");return;}
    const nuovi=[...saeCodes,s];setSaeCodes(nuovi);setSaeInp("");
    saveVetSae(vetture,nuovi);fire("🔖 SAE "+s+" aggiunto!");
  }
  function removeSae(s){
    const nuovi=saeCodes.filter(x=>x!==s);setSaeCodes(nuovi);saveVetSae(vetture,nuovi);fire("SAE rimosso");
  }

  function applyShift(shiftId){
    if(!dayPanel)return;
    const note=buildNote(driver.shifts[dayPanel.key]?.note||"",vetture,saeCodes);
    const sh=allShifts.find(s=>s.id===shiftId);
    onUpdate({...driver,shifts:{...driver.shifts,[dayPanel.key]:{shiftId,note}}});
    setDayPanel(p=>p?{...p,shift:sh,data:{shiftId,note}}:null);
    setShowSpicker(false);fire("✓ Turno assegnato");
  }

  // Turno manuale con orario + linea custom
  const [manualForm,setManualForm]=useState({start:"",end:"",linea:"",tipo:"mattina"});
  function applyManualShift(){
    if(!dayPanel||!manualForm.start)return;
    const h=parseInt(manualForm.start.split(":")[0])||0;
    let baseId="mattina",icon="🌅",color="#F59E0B";
    if(h>=12&&h<17){baseId="pomeriggio";icon="☀️";color="#3B82F6";}
    else if(h>=17){baseId="notte";icon="🌙";color="#8B5CF6";}
    const cid="manual_"+dayPanel.key+"_"+Date.now();
    const newCustom={id:cid,label:manualForm.linea||("Serv. "+manualForm.start),icon,color,start:manualForm.start,end:manualForm.end,linea:manualForm.linea};
    const noteParts=[];
    if(manualForm.linea) noteParts.push("Linea "+manualForm.linea);
    if(manualForm.start) noteParts.push("Pres: "+manualForm.start);
    if(manualForm.end)   noteParts.push("Smonto: "+manualForm.end);
    const note=noteParts.join(" · ");
    onUpdate({...driver,custom:[...(driver.custom||[]),newCustom],shifts:{...driver.shifts,[dayPanel.key]:{shiftId:cid,note}}});
    setDayPanel(p=>p?{...p,shift:newCustom,data:{shiftId:cid,note}}:null);
    setShowSpicker(false);setManualForm({start:"",end:"",linea:"",tipo:"mattina"});
    fire("✓ Turno manuale assegnato");
  }
  function removeShift(){
    if(!dayPanel)return;
    const s={...driver.shifts};delete s[dayPanel.key];
    onUpdate({...driver,shifts:s});
    setDayPanel(null);setShowSpicker(false);fire("Turno rimosso");
  }

  // Pannello giorno — stato edit orario
  const [editOrario,setEditOrario]=useState(false);
  const [editStart,setEditStart]=useState("");
  const [editEnd,setEditEnd]=useState("");

  function openEditOrario(){
    setEditStart(dayPanel?.shift?.start||"");
    setEditEnd(dayPanel?.shift?.end||"");
    setEditOrario(true);
  }
  function saveEditOrario(){
    if(!dayPanel||!editStart)return;
    // Aggiorna il turno custom con i nuovi orari
    const shId=dayPanel.shift?.id;
    if(!shId){setEditOrario(false);return;}
    const updCustom=(driver.custom||[]).map(c=>
      c.id===shId?{...c,start:editStart,end:editEnd}:c
    );
    // Se non è un turno custom (è preset), lo rende custom con i nuovi orari
    if(!updCustom.find(c=>c.id===shId)&&dayPanel.shift){
      const newCustom={...dayPanel.shift,id:"edit_"+shId+"_"+dayPanel.key,start:editStart,end:editEnd};
      const updShifts={...driver.shifts,[dayPanel.key]:{...driver.shifts[dayPanel.key],shiftId:newCustom.id}};
      onUpdate({...driver,custom:[...(driver.custom||[]),newCustom],shifts:updShifts});
    } else {
      onUpdate({...driver,custom:updCustom});
    }
    // Aggiorna anche la nota con nuovi orari
    const existing=driver.shifts[dayPanel.key]||{};
    const oldNote=existing.note||"";
    const newNote=oldNote
      .replace(/Pres:\s*\d{2}:\d{2}/,"Pres: "+editStart)
      .replace(/Smonto:\s*\d{2}:\d{2}/,"Smonto: "+editEnd);
    onUpdate(prev=>({...prev,
      custom:(prev.custom||[]).map(c=>c.id===shId?{...c,start:editStart,end:editEnd}:c),
      shifts:{...prev.shifts,[dayPanel.key]:{...(prev.shifts[dayPanel.key]||{}),note:newNote}}
    }));
    setEditOrario(false);
    fire("✓ Orario aggiornato");
    setDayPanel(p=>p?{...p,shift:p.shift?{...p.shift,start:editStart,end:editEnd}:p.shift}:p);
  }

  async function handlePDF(e){
    const file=e.target.files[0];if(!file)return;e.target.value="";
    setImporting(true);setImportPreview(null);
    try{const rows=await parsePDF(file);if(!rows.length){fire("Nessun turno trovato nel PDF");setImporting(false);return;}setImportPreview(rows);fire("✅ Trovati "+rows.length+" giorni");}
    catch(err){fire("❌ "+err.message);}
    setImporting(false);
  }

  // ── Riconoscimento turni da FOTO con Claude Vision ──────────────────────────
  async function handleFoto(e){
    const file=e.target.files[0];
    if(!file)return;

    // URL del Cloudflare Worker — salvato nelle impostazioni
    const workerUrl=(localStorage.getItem("anm_worker_url")||"").trim();
    if(!workerUrl){
      setFotoStatus("error");
      setFotoMsg("\u274c Inserisci l'URL del Worker Cloudflare nelle Impostazioni (tab \ud83d\udcd6 Guida) per usare il riconoscimento foto.");
      return;
    }

    setFotoImporting(true);
    setFotoStatus("loading");
    setFotoMsg("\ud83d\udd0d Analisi foto in corso con AI\u2026");
    setImportPreview(null);

    try{
      // Riduce l'immagine prima di inviarla (max 1200px, qualità 85%)
      // Necessario perché le foto iPhone sono troppo grandi (5-10MB)
      const base64=await new Promise((res,rej)=>{
        const img=new Image();
        const objUrl=URL.createObjectURL(file);
        img.onload=()=>{
          URL.revokeObjectURL(objUrl);
          const MAX=1200;
          let w=img.width,h=img.height;
          if(w>MAX||h>MAX){
            if(w>h){h=Math.round(h*MAX/w);w=MAX;}
            else{w=Math.round(w*MAX/h);h=MAX;}
          }
          const canvas=document.createElement("canvas");
          canvas.width=w;canvas.height=h;
          const ctx=canvas.getContext("2d");
          ctx.drawImage(img,0,0,w,h);
          const dataUrl=canvas.toDataURL("image/jpeg",0.85);
          res(dataUrl.split(",")[1]);
        };
        img.onerror=rej;
        img.src=objUrl;
      });
      const mediaType="image/jpeg";

      const prompt="Analizza questa immagine di un quindicinale turni ANM Napoli. "+
        "Per ogni turno trovato restituisci un oggetto JSON con: "+
        "day (numero 1-31), month (numero 0-11 dove 0=gennaio), year (anno intero), "+
        "tipo (uno tra: serv, riposo, ferie, malattia, permesso, festivo, spezzato_ap, spezzato_ch, disp_mattina, disp_serale, disp_notturna), "+
        "linea (es R3 oppure stringa vuota), pres (orario HH:MM oppure stringa vuota), fine (orario HH:MM oppure stringa vuota). "+
        "Corrispondenze: SERV/SV=serv, RIP/RIPO=riposo, FER/FERIE=ferie, MAL=malattia, PERM=permesso, FEST=festivo, "+
        "SPEZ AP=spezzato_ap, SPEZ CH=spezzato_ch, DISP M=disp_mattina, DISP S=disp_serale, DISP N=disp_notturna. "+
        "Rispondi SOLO con un array JSON puro. Nessun testo. Nessun markdown. Se non trovi nulla: []";

      const resp=await fetch(workerUrl,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-haiku-4-5-20251001",
          max_tokens:2000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
            {type:"text",text:prompt}
          ]}]
        })
      });

      if(!resp.ok){
        const errBody=await resp.text();
        let msg="Errore Worker ("+resp.status+")";
        try{const j=JSON.parse(errBody);msg=j.error?.message||msg;}catch(x){}
        throw new Error(msg);
      }

      const data=await resp.json();
      if(data.error) throw new Error(data.error.message||"Errore API Anthropic");

      const rawText=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(!rawText) throw new Error("Risposta vuota. Riprova.");

      let parsed=[];
      try{parsed=JSON.parse(rawText);}
      catch(pe){
        const m=rawText.match(/\[[\s\S]*?\]/);
        if(m){try{parsed=JSON.parse(m[0]);}catch(x){throw new Error("Risposta non leggibile. Riprova con foto pi\xf9 chiara.");}}
        else throw new Error("Nessun dato strutturato. Riprova con una foto pi\xf9 nitida.");
      }

      if(!Array.isArray(parsed)||parsed.length===0){
        setFotoStatus("error");
        setFotoMsg("\u274c Nessun turno riconosciuto. Prova con una foto pi\xf9 nitida e ben illuminata.");
        setFotoImporting(false);
        return;
      }

      const preview=parsed
        .filter(r=>r.day&&r.month!==undefined&&r.year)
        .map(r=>({
          day:parseInt(r.day)||1,month:parseInt(r.month)||0,
          year:parseInt(r.year)||new Date().getFullYear(),
          tipo:(r.tipo||"serv").toLowerCase().trim(),
          linea:(r.linea||"").trim(),pres:(r.pres||"").trim(),fine:(r.fine||"").trim(),
          fromFoto:true
        }));

      if(preview.length===0){
        setFotoStatus("error");
        setFotoMsg("\u274c Nessun turno valido estratto. Controlla la foto e riprova.");
      } else {
        setFotoStatus("ok");
        setFotoMsg("\u2705 "+preview.length+" turni riconosciuti \u2014 controlla e conferma");
        setImportPreview(preview);
      }

    }catch(err){
      console.error("handleFoto error:",err);
      setFotoStatus("error");
      setFotoMsg("\u274c "+err.message);
    }
    setFotoImporting(false);
  }
  function confirmImport(){

  );
}

// ════════════════════════════════════════════════════════════════════════════
// VISTA GIORNALIERA GLOBALE — tutti gli autisti per un giorno scelto
// ════════════════════════════════════════════════════════════════════════════
function GiornataView({drivers,onSelectDriver,fire}){
  const today=new Date();
  const todayStr=dk(today.getFullYear(),today.getMonth(),today.getDate());
  const [data,setData]=useState(todayStr);
  const [filtroTurno,setFiltroTurno]=useState("tutti");
  const [filtroTipo,setFiltroTipo]=useState("tutti");
  const [filtroLinea,setFiltroLinea]=useState("");
  const [searchQ,setSearchQ]=useState("");
  const [showCondividi,setShowCondividi]=useState(false); // mantenuto per compat

  // Tutti i tipi turno unificati (preset + custom da ogni autista)
  const allCustomById=useMemo(()=>{
    const map={};
    drivers.forEach(d=>(d.custom||[]).forEach(c=>{map[c.id]=c;}));
    return map;
  },[drivers]);

  function getShift(driver,key){
    const data=driver.shifts?.[key];
    if(!data) return null;
    return [...PRESET_SHIFTS,...(driver.custom||[])].find(s=>s.id===data.shiftId)||null;
  }
  function getShiftData(driver,key){
    return driver.shifts?.[key]||null;
  }

  // Risultati filtrati per la data selezionata
  const risultati=useMemo(()=>{
    const key=data;
    return drivers
      .filter(d=>{
        if(filtroTipo!=="tutti"&&d.tipo!==filtroTipo) return false;
        if(searchQ.trim()){
          const q=searchQ.toLowerCase();
          if(!d.nome.toLowerCase().includes(q)&&!d.mat.includes(q)) return false;
        }
        const sh=getShift(d,key);
        if(filtroTurno==="con"&&!sh) return false;
        if(filtroTurno==="senza"&&sh) return false;
        // Filtro linea
        if(filtroLinea.trim()){
          const ql=filtroLinea.trim().toLowerCase();
          const linea=(sh?.linea||"").toLowerCase();
          const note=(d.shifts?.[key]?.note||"").toLowerCase();
          if(!linea.includes(ql)&&!note.includes(ql)) return false;
        }
        return true;
      })
      .map(d=>{
        const sh=getShift(d,key);
        const sd=getShiftData(d,key);
        return{driver:d,shift:sh,shiftData:sd};
      })
      .sort((a,b)=>{
        // Prima chi ha turno, ordinati per orario inizio
        if(a.shift&&!b.shift) return -1;
        if(!a.shift&&b.shift) return 1;
        if(a.shift&&b.shift){
          const ta=a.shift.start||"99:99",tb=b.shift.start||"99:99";
          if(ta!==tb) return ta.localeCompare(tb);
        }
        return a.driver.nome.localeCompare(b.driver.nome);
      });
  },[drivers,data,filtroTurno,filtroTipo,searchQ]);

  const conTurno=risultati.filter(r=>r.shift).length;
  const senzaTurno=risultati.filter(r=>!r.shift).length;

  // Raggruppa per tipo turno (per la visualizzazione)
  const gruppi=useMemo(()=>{
    const map={};
    risultati.filter(r=>r.shift).forEach(r=>{
      const key=r.shift.id;
      if(!map[key]) map[key]={shift:r.shift,items:[]};
      map[key].items.push(r);
    });
    // Ordina gruppi per orario
    return Object.values(map).sort((a,b)=>{
      const ta=a.shift.start||"99:99",tb=b.shift.start||"99:99";
      return ta.localeCompare(tb);
    });
  },[risultati]);

  // Genera testo riepilogativo da condividere
  function buildRiepilogo(){
    const d=new Date(data.replace(/-/g,'/'));
    const DOWS=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
    const MESI_IT=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
    const dataStr=`${DOWS[d.getDay()]} ${d.getDate()} ${MESI_IT[d.getMonth()]} ${d.getFullYear()}`;
    const lines=["📅 TURNI ANM — "+dataStr,""];
    gruppi.forEach(g=>{
      lines.push(g.shift.icon+" "+( g.shift.linea||g.shift.label).toUpperCase()+(g.shift.start?" ("+g.shift.start+" – "+g.shift.end+")":""));
      g.items.forEach(r=>{
        const note=r.shiftData?.note||"";
        const vets=(note.match(/Vettura:\s*([\w]+)/g)||[]).map(v=>v.replace(/Vettura:\s*/,""));
        lines.push("  • "+r.driver.nome+"  ["+r.driver.mat+"]"+(vets.length?" 🚍 "+vets.join(","):""));
      });
      lines.push("");
    });
    const noTurno=risultati.filter(r=>!r.shift);
    if(noTurno.length){
      lines.push("⬜ SENZA TURNO ASSEGNATO");
      noTurno.forEach(r=>lines.push("  • "+r.driver.nome+"  ["+r.driver.mat+"]"));
    }
    lines.push("\n📱 Gestione Turni ANM Napoli");
    return lines.join("\n");
  }

  function condividi(ch){
    const msg=buildRiepilogo();
    if(ch==="wa") window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
    else if(ch==="tg") window.open("tg://msg?text="+encodeURIComponent(msg),"_blank");
    else {
      if(navigator.clipboard&&window.isSecureContext){
        navigator.clipboard.writeText(msg).then(()=>fire("✓ Riepilogo copiato!"));
      } else {
        const ta=document.createElement("textarea");ta.value=msg;ta.style.cssText="position:fixed;opacity:0";
        document.body.appendChild(ta);ta.focus();ta.select();
        try{document.execCommand("copy");fire("✓ Copiato!");}catch(e){}
        document.body.removeChild(ta);
      }
    }
  }

  // Naviga al giorno precedente/successivo
  function navDay(delta){
    const d=new Date(data.replace(/-/g,'/'));
    d.setDate(d.getDate()+delta);
    setData(dk(d.getFullYear(),d.getMonth(),d.getDate()));

  const d=new Date(data.replace(/-/g,'/'));

        },"‹"),

          React.createElement('input',{

        React.createElement('button',{

        },"›")

      // Badge "Torna a Oggi" se non siamo oggi
      !isToday&&React.createElement('button',{
        onClick:()=>setData(todayStr),
        style:{width:"100%",marginBottom:8,background:"rgba(245,166,35,.1)",border:"1px solid rgba(245,166,35,.35)",
          borderRadius:8,padding:"7px",color:"var(--anm)",fontFamily:"'DM Sans',sans-serif",
          fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
        React.createElement('span',null,"📅"),"Torna a Oggi"
      ),
      // Statistiche rapide
      React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}},
        React.createElement('div',{style:{background:"var(--anm-dim)",border:"1px solid rgba(245,166,35,.25)",borderRadius:8,padding:"6px 8px",textAlign:"center"}},
          React.createElement('div',{style:{fontSize:17,fontWeight:700,fontFamily:"'Space Mono',monospace",color:"var(--anm)"}},conTurno),
          React.createElement('div',{style:{fontSize:8,color:"var(--txt3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".4px",marginTop:1}},"Con turno")

        // Gruppi per tipo turno
        gruppi.map(g=>React.createElement('div',{key:g.shift.id,style:{marginBottom:14}},

     passi:[
       {t:"Barra in basso",d:"La barra di navigazione ha 7 pulsanti fissi: 📆 Giornata (turni del giorno), 👥 Autisti (lista completa), 🔄 Cambi (richieste cambio), 📒 Rubrica (862 contatti ANM), 💬 WA (riepilogo oggi su WhatsApp), ✈️ TG (Telegram), 📖 Guida."},
       {t:"Header in cima",d:"In alto trovi: badge ANM, titolo Gestione Turni, badge ☁️ sync (stato cloud), pulsante 🌙/☀️ tema, pulsante 🔒/🔓 PIN, contatore autisti."},
       {t:"Tema chiaro / scuro",d:"Tocca 🌙 per passare al tema chiaro ☀️ e viceversa. La preferenza viene salvata. Il tema scuro è consigliato di notte."},
     ]},
    {id:"giornata",ic:"📆",titolo:"Vista Giornata",colore:"#f5a623",
     passi:[
       {t:"Navigare tra i giorni",d:"Usa ‹ e › per andare al giorno precedente o successivo. Tocca la data per scegliere qualsiasi giorno. Se non sei su oggi compare il pulsante arancione 📅 Torna a Oggi."},
       {t:"Statistiche rapide",d:"Tre riquadri: Con turno (autisti che lavorano), Senza turno (autisti liberi), Totale (visibili con i filtri attivi)."},
       {t:"Filtri",d:"Filtra per stato turno: Tutti / ✓ Turno / ✗ Vuoti. Per tipo contratto: Tutti / ANM / INT. Campo 🚌 per filtrare per linea (es. R3, 151, C1)."},
       {t:"Ricerca",d:"La barra di ricerca accetta: nome, cognome, matricola, linea, orario (es. 06:00)."},
       {t:"Card autista e invio turno",d:"Ogni autista mostra nome, matricola, tipo, vettura e telefono. Tocca 💬 o ✈️ sotto il nome per inviare il turno. Tocca il nome per aprire la scheda completa."},
     ]},
    {id:"pdf",ic:"📄",titolo:"Caricare il Quindicinale PDF o Foto",colore:"#3ecf8e",
     passi:[
       {t:"Cos'è il quindicinale",d:"Foglio ufficiale ANM con i turni dei 15 giorni successivi. L'app importa automaticamente: turni, orari, linee, località monto (es. CVAO, SUALE1) e tipo smonto (Dep/Linea)."},
       {t:"Caricare il PDF",d:"Scheda autista → tab 📄 Quindicinale → pulsante arancione 📂 Carica PDF → seleziona il file ANM. Appare l'anteprima con tutti i dati trovati. Tocca ✓ Importa per confermare."},
       {t:"Caricare una FOTO 📸",d:"Tocca il pulsante blu 📸 Carica foto → seleziona la foto dalla galleria. Claude AI analizza la foto e riconosce tutti i turni. Appare la stessa anteprima del PDF. Richiede il Worker Cloudflare configurato nelle Impostazioni."},
       {t:"Consigli per la foto",d:"Illumina bene il foglio, fotografalo in piano senza angolazioni, testo nitido e leggibile. Funziona con quindicinali stampati e scritti a mano."},
       {t:"Rimuovere i turni",d:"Sotto i pulsanti Carica trovi 🗑 Rimuovi turni: pulsanti per ogni mese (es. Mar (30)) e il pulsante ❌ Tutti. Viene sempre chiesta conferma prima di eliminare."},
       {t:"Attenzione",d:"Caricando un nuovo PDF i nuovi turni si aggiungono a quelli esistenti — i giorni in comune vengono aggiornati."},
     ]},
    {id:"calendario",ic:"📅",titolo:"Calendario e Dettaglio Giorno",colore:"#4f8ef7",
     passi:[
       {t:"Leggere il calendario",d:"🌅 arancione = mattina · ☀️ blu = pomeriggio · 🌙 viola = notte · 🛌 verde = riposo · 🏖️ rosa = ferie · 🏥 rosso = malattia · 📝 permesso · 🎉 festivo · ✂️ spezzato · 📋 disponibilità. Celle grigie = nessun turno."},
       {t:"Statistiche e CSV",d:"In cima: riepilogo mensile per categoria. Pulsante 📥 Esporta CSV mensile per scaricare il file apribile con Excel."},
       {t:"Pannello giorno",d:"Tocca qualsiasi giorno per aprire il pannello dal basso. Trovi: tipo turno, orario ⏰ (✏️ modificabile), riga 📍 Monto → Smonto (località e tipo smonto, ✏️ modificabile), vetture, SAE e pulsanti invia/richiedi."},
       {t:"Chiudere il pannello",d:"Tocca ✕ in basso a destra, oppure tocca l'area scura fuori dal pannello."},
     ]},
    {id:"turni",ic:"✏️",titolo:"Assegnare e Modificare Turni",colore:"#f5a623",
     passi:[
       {t:"Assegnare un turno",d:"Pannello giorno → ✏️ Assegna turno (o Cambia turno). Si apre il selettore con turni manuali e preimpostati."},
       {t:"Turno manuale",d:"Inserisci Monto (es. 06:35), Smonto (es. 13:10) e Linea (opzionale). Tocca ✓ Assegna turno manuale."},
       {t:"Turno preimpostato",d:"📌 Servizi (Mattina/Pomeriggio/Notte + turni dal PDF) · ✂️ Spezzati · 📋 Disponibilità · 🛌 Riposi e assenze (Riposo, Ferie, Malattia, Permesso, Festivo, Rip. Compensativo)."},
       {t:"Correggere l'orario",d:"Pannello giorno → riga ⏰ Orario turno (✏️) → correggi Monto e Smonto → ✓ Salva orario."},
       {t:"Modificare Monto/Smonto (località)",d:"Pannello giorno → riga 📍 Monto → Smonto (✏️). Modifica la Località monto (es. CVAO, SUALE1) e il Tipo smonto (pulsanti Dep / Linea o testo libero). Tocca ✓ Salva."},
       {t:"Rimuovere un turno",d:"Pannello giorno → pulsante 🗑 Rimuovi in basso. Elimina il turno solo per quel giorno."},
     ]},
    {id:"vetture",ic:"🚍",titolo:"Vetture e Codici SAE",colore:"#f5a623",
     passi:[
       {t:"Aggiungere vettura e SAE",d:"Pannello giorno → sezione 🚍 Vetture → digita numero (es. 4521) → + Aggiungi. Stessa cosa per 🔖 SAE. Puoi aggiungerne più di uno."},
       {t:"Rimuovere",d:"Tocca la ✕ sul chip per rimuoverlo."},
       {t:"Dove appaiono",d:"Vetture e SAE appaiono nella Vista Giornata e nei messaggi WhatsApp/Telegram."},
     ]},
    {id:"condivisione",ic:"💬",titolo:"Inviare Turni via WhatsApp/Telegram",colore:"#25D166",
     passi:[
       {t:"Riepilogo di tutti (barra in basso)",d:"Tocca 💬 WA o ✈️ TG nella barra in basso. Invia il riepilogo completo dei turni di OGGI al gruppo di lavoro."},
       {t:"Turno di un singolo autista",d:"Vista Giornata → tocca 💬 o ✈️ sotto il nome dell'autista. Messaggio con nome, matricola, data, turno, orario, linea, vettura."},
       {t:"📤 Invia / 📲 Richiedi dal pannello giorno",d:"Pannello giorno → scorri in basso. 📤 Invia turno = manda i dettagli del turno al collega. 📲 Richiedi turno = chiedi al collega di inviarti i dettagli del suo. Cerca il collega per nome o matricola, aggiungi nota opzionale e scegli il canale."},
     ]},
    {id:"cambi",ic:"🔄",titolo:"Gestione Cambi Turno",colore:"#f75f5f",
     passi:[
       {t:"Tre tipi di cambio",d:"🔍 Cerca cambio = vuole trovare qualcuno con cui scambiare (bordo blu) · 📢 Offre turno = vuole cedere il suo (bordo arancione) · 🔁 Sostituzione = prende il turno dell'altro senza scambio (bordo verde)."},
       {t:"Aggiungere una richiesta",d:"Scheda autista → tab 🔄 Cambi → ➕ Aggiungi cambio turno → scegli Data, Tipo, WhatsApp collega (opzionale), Nota → ✓ Aggiungi."},
       {t:"Condividere, accettare, eliminare",d:"Ogni cambio ha 💬 WA e ✈️ TG. Tocca ✓ Accetta per confermare (bordo verde). Tocca 🗑 per eliminare."},
       {t:"Vista globale",d:"Tab 🔄 Cambi nella barra in basso = TUTTI i cambi di TUTTI gli autisti. I cambi In attesa in cima. Il pallino rosso indica quante richieste sono in sospeso."},
     ]},
    {id:"rubrica",ic:"📒",titolo:"Rubrica Contatti",colore:"#4f8ef7",
     passi:[
       {t:"Aprire la Rubrica",d:"Tocca il tab 📒 Rubrica nella barra in basso. 862 contatti ANM con nome, cognome, matricola, deposito e telefono."},
       {t:"Cercare un contatto",d:"Usa la barra di ricerca per nome, cognome, matricola o numero di telefono. Ricerca in tempo reale."},
       {t:"Filtrare per deposito",d:"Pulsanti: Cav.Aosta, Puglie, Carlo III, S.Giovanni, — (senza deposito), Tutti."},
       {t:"Chiamare o WhatsApp",d:"Tocca 💬 per aprire WhatsApp direttamente in chat. Tocca 📞 per la chiamata telefonica diretta."},
     ]},
    {id:"autisti",ic:"👥",titolo:"Gestire gli Autisti",colore:"#4f8ef7",
     passi:[
       {t:"Cercare e aggiungere",d:"Tab 👥 Autisti → cerca per nome o matricola. I chip ANM / INT filtrano per categoria. Tocca ➕ per aggiungere un nuovo autista."},
       {t:"Modificare e eliminare",d:"Tocca ✏️ a destra del nome per modificare matricola o tipo. Scorri in fondo → 🗑 Elimina autista (irreversibile)."},
       {t:"Note e telefono",d:"Scheda autista → tab 📄 Quindicinale → sezione NOTE AUTISTA. Salva telefono e note libere (deposito, preferenze, scadenza CQC, ecc.)."},
     ]},
    {id:"faq",ic:"❓",titolo:"Problemi Frequenti",colore:"#a78bfa",
     passi:[
       {t:"Il PDF non viene letto (0 giorni)",d:"Usa solo il PDF originale ANM. Se non funziona, prova il pulsante 📸 Carica foto oppure inserisci i turni manualmente."},
       {t:"Gli orari sono sbagliati",d:"Pannello giorno → riga ⏰ Orario turno (✏️) → correggi → ✓ Salva."},
       {t:"Monto/Smonto sbagliati",d:"Pannello giorno → riga 📍 Monto → Smonto (✏️) → modifica Località monto e Tipo smonto → ✓ Salva."},
       {t:"I turni scompaiono su altro dispositivo",d:"Se la sync cloud è attiva (☁️ verde) i dati si sincronizzano automaticamente. Altrimenti usa 📥 Backup (Guida → Impostazioni) per trasferire i dati."},
       {t:"La foto AI non funziona",d:"Guida → Impostazioni → 🤖 Worker Cloudflare. Verifica che l'URL sia corretto (https://anm-proxy.chicco81.workers.dev/) e che il Worker abbia la chiave API Anthropic valida con crediti attivi."},
       {t:"Ho dimenticato il PIN",d:"Aggiungi ?reset=1 all'URL (es: https://chicco81.github.io/ANM-QUINDICINALE-/?reset=1) e ricarica. Il PIN viene rimosso senza toccare i dati."},
       {t:"WhatsApp non si apre",d:"WhatsApp deve essere installato. Su computer si apre la versione web. Se il browser blocca i link, controlla le impostazioni di sicurezza."},
       {t:"Come si aggiorna l'app",d:"Ricarica la pagina dal browser, oppure chiudi e riapri l'app se installata come PWA."},
     ]},
    {id:"pin",ic:"🔒",titolo:"PIN di Accesso",colore:"#3ecf8e",
     passi:[
       {t:"Impostare il PIN",d:"Tab 📖 Guida → Impostazioni → Imposta PIN (verde). Inserisci 4 cifre → reinseriscile per conferma. Se coincidono il PIN è attivo."},
       {t:"Come funziona all'avvio",d:"Ogni apertura mostra il tastierino. Se sbagli, i pallini tremano e si azzerano — riprova subito, nessun limite di tentativi."},
       {t:"Rimuovere o cambiare",d:"Guida → Impostazioni → Rimuovi (rosso). Per cambiarlo: prima rimuovi, poi imposta quello nuovo."},
       {t:"PIN dimenticato",d:"Aggiungi ?reset=1 all'URL (es: https://chicco81.github.io/ANM-QUINDICINALE-/?reset=1) e ricarica. Il PIN viene rimosso senza toccare i dati."},
     ]},
    {id:"sync",ic:"☁️",titolo:"Sincronizzazione Cloud",colore:"#a78bfa",
     passi:[
       {t:"A cosa serve",d:"Senza sync i dati vivono solo nel browser del tuo dispositivo. Con Firebase Realtime Database tutti i dispositivi vedono gli stessi turni in tempo reale."},
       {t:"Come si attiva",d:"Configurazione una tantum: creare progetto Firebase, attivare Realtime Database, inserire credenziali nel codice (apiKey, projectId, databaseURL) e caricare su GitHub."},
       {t:"Stato sync",d:"☁️ sync verde = ok · ⏳ = sta sincronizzando · ☁️✗ rosso = errore · Nessun badge = non configurata."},
       {t:"Cosa viene sincronizzato",d:"Tutto: turni, assegnazioni, vetture, SAE, note, telefoni, depositi, cambi. Solo il PIN rimane locale."},
       {t:"Sync manuale",d:"Guida → Impostazioni → Sync ora."},
     ]},
    {id:"notifiche",ic:"🔔",titolo:"Notifiche Push",colore:"#4f8ef7",
     passi:[
       {t:"Attivare",d:"Tab 📖 Guida → Impostazioni → tocca Attiva accanto a 🔔 → tocca Consenti. Avvisano quando ci sono cambi turno in sospeso."},
       {t:"Su iPhone",d:"Funzionano SOLO da PWA installata: Safari → Condividi → Aggiungi a schermata Home. Poi riapri dall'icona e attiva dalla Guida."},
       {t:"Su Android",d:"Funzionano direttamente da Chrome. Puoi anche installare come PWA: ⋮ → Aggiungi a schermata Home."},
     ]},
    {id:"backup",ic:"💾",titolo:"Backup e Ripristino",colore:"#f5a623",
     passi:[
       {t:"Eseguire un backup",d:"Guida → Impostazioni → 📥 Backup. Il browser scarica il file anm-backup-DATA.json. Salvalo su Google Drive, iCloud o invialo per email a te stesso."},
       {t:"Ripristinare i dati",d:"Guida → Impostazioni → 📤 Ripristina → seleziona il file JSON. L'app carica tutti i turni istantaneamente."},
       {t:"Quando farlo",d:"Prima di cambiare telefono, prima di aggiornamenti importanti, e almeno una volta a settimana se non hai la sync cloud attiva."},
     ]},
    {id:"condividi",ic:"📲",titolo:"Condividi l'app con i colleghi",colore:"#25D166",
     passi:[
       {t:"QR Code",d:"In fondo a questa pagina trovi il QR code. Inquadralo con la fotocamera per aprire l'app. Tocca 💬 Condividi su WhatsApp per inviare il link con messaggio già pronto."},
       {t:"Pagina QR dedicata",d:"Vai su https://chicco81.github.io/ANM-QUINDICINALE-/qrcode.html per la pagina QR da condividere — ha il pulsante WhatsApp e le istruzioni per installare."},
       {t:"Installare su iPhone",d:"Safari → vai all'indirizzo → Condividi → Aggiungi a schermata Home."},
       {t:"Installare su Android",d:"Chrome → vai all'indirizzo → menu ⋮ → Aggiungi a schermata Home."},
     ]},
  ];

  function Sezione({s}){
    const open=aperta===s.id;
    return React.createElement('div',{style:{marginBottom:8}},
      // Header sezione — tocca per aprire/chiudere
      React.createElement('div',{
        onClick:()=>setAperta(open?null:s.id),
        style:{display:"flex",alignItems:"center",gap:12,background:open?"var(--bg3)":"var(--bg2)",
          border:"1px solid "+(open?s.colore+"55":"var(--border)"),borderRadius:open?"var(--r) var(--r) 0 0":"var(--r)",
          padding:"13px 16px",cursor:"pointer",transition:"all .15s"}
      },
        React.createElement('div',{style:{width:38,height:38,borderRadius:10,
          background:"linear-gradient(135deg,"+s.colore+"33,"+s.colore+"18)",
          border:"1px solid "+s.colore+"44",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},s.ic),
        React.createElement('div',{style:{flex:1}},
          React.createElement('div',{style:{fontSize:14,fontWeight:700,color:open?s.colore:"var(--txt)",letterSpacing:"-.2px"}},s.titolo),
          React.createElement('div',{style:{fontSize:10,color:"var(--txt3)",marginTop:1}},s.passi.length+" argomenti")
        ),
        React.createElement('div',{style:{fontSize:18,color:"var(--txt3)",fontWeight:700,transform:open?"rotate(90deg)":"none",transition:"transform .2s"}},
          "›"
        )
      ),
      // Contenuto — visibile solo se aperto
      open&&React.createElement('div',{style:{background:"var(--bg3)",border:"1px solid "+s.colore+"44",
        borderTop:"none",borderRadius:"0 0 var(--r) var(--r)",padding:"4px 0 8px"}},
        s.passi.map((p,i)=>React.createElement('div',{key:i,
          style:{display:"flex",gap:12,padding:"12px 16px",
            borderBottom:i<s.passi.length-1?"1px solid var(--border)":"none"}},
          React.createElement('div',{style:{width:22,height:22,borderRadius:6,
            background:s.colore+"22",border:"1px solid "+s.colore+"44",
            color:s.colore,fontSize:9,fontWeight:800,fontFamily:"'Space Mono',monospace",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}},
            i+1
          ),
          React.createElement('div',null,
            React.createElement('div',{style:{fontSize:13,fontWeight:700,color:"var(--txt)",marginBottom:3}},p.t),
            React.createElement('div',{style:{fontSize:12,color:"var(--txt2)",lineHeight:1.6}},p.d)
          )
        ))
      )
    );
  }

  return React.createElement('div',{className:"main"},
    React.createElement('div',{style:{padding:"16px 14px 80px"}},
      // ── IMPOSTAZIONI RAPIDE ──────────────────────────────────────
      React.createElement('div',{style:{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:"var(--r)",marginBottom:14,overflow:"hidden"}},
        React.createElement('div',{style:{padding:"12px 16px",background:"var(--bg3)",borderBottom:"1px solid var(--border)",fontSize:10,fontWeight:700,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:".7px"}},"⚙️ Impostazioni"),

        // PIN
        React.createElement('div',{style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:"1px solid var(--border)"}},
          React.createElement('div',{style:{width:38,height:38,borderRadius:10,background:pinAbilitato?"rgba(62,207,142,.15)":"rgba(255,255,255,.05)",border:"1px solid "+(pinAbilitato?"rgba(62,207,142,.3)":"var(--border2)"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},pinAbilitato?"🔒":"🔓"),
          React.createElement('div',{style:{flex:1}},
            React.createElement('div',{style:{fontSize:13,fontWeight:700,color:"var(--txt)"}},pinAbilitato?"PIN attivo":"PIN non impostato"),
            React.createElement('div',{style:{fontSize:11,color:"var(--txt3)",marginTop:2}},pinAbilitato?"L'app richiede il PIN all'avvio":"Nessuna protezione — chiunque può accedere")
          ),
          pinAbilitato
            ?React.createElement('button',{onClick:onRemovePin,style:{background:"var(--red-dim)",border:"1px solid rgba(247,95,95,.3)",color:"var(--red)",padding:"7px 12px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:12}},"Rimuovi")
            :React.createElement('button',{onClick:onSetPin,style:{background:"var(--green-dim)",border:"1px solid rgba(62,207,142,.3)",color:"var(--green)",padding:"7px 12px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:12}},"Imposta PIN")
        ),

        // NOTIFICHE
        React.createElement('div',{style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:"1px solid var(--border)"}},
          React.createElement('div',{style:{width:38,height:38,borderRadius:10,
            background:notifPerm==="granted"?"rgba(79,142,247,.15)":"rgba(255,255,255,.05)",
            border:"1px solid "+(notifPerm==="granted"?"rgba(79,142,247,.3)":"var(--border2)"),
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},"🔔"),
          React.createElement('div',{style:{flex:1}},
            React.createElement('div',{style:{fontSize:13,fontWeight:700,color:"var(--txt)"}},
              notifPerm==="granted"?"Notifiche attive":notifPerm==="denied"?"Notifiche bloccate":"Notifiche non attivate"
            ),
            React.createElement('div',{style:{fontSize:11,color:"var(--txt3)",marginTop:2}},
              notifPerm==="granted"?"Ricevi avvisi per i cambi turno in sospeso":
              notifPerm==="denied"?"Vai nelle impostazioni del browser per sbloccarle":
              "Attiva per ricevere avvisi sui cambi turno"
            )
          ),
          notifPerm!=="granted"&&notifPerm!=="denied"&&React.createElement('button',{
            onClick:richiediNotif,
            style:{background:"var(--blue-dim)",border:"1px solid rgba(79,142,247,.3)",color:"var(--blue)",padding:"7px 12px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:12}
          },"Attiva")
        ),

        // SINCRONIZZAZIONE CLOUD
        React.createElement('div',{style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px"}},
          React.createElement('div',{style:{width:38,height:38,borderRadius:10,
            background:fbConfigured?"rgba(167,139,250,.15)":"rgba(255,255,255,.05)",
            border:"1px solid "+(fbConfigured?"rgba(167,139,250,.3)":"var(--border2)"),
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},"☁️"),
          React.createElement('div',{style:{flex:1}},
            React.createElement('div',{style:{fontSize:13,fontWeight:700,color:"var(--txt)"}},
              fbConfigured?"Sync cloud "+( syncStatus==="ok"?"✓":syncStatus==="error"?"⚠️":"…"):"Sync cloud non configurato"
            ),
            React.createElement('div',{style:{fontSize:11,color:"var(--txt3)",marginTop:2}},
              fbConfigured
                ?lastSync?"Ultimo aggiornamento: "+lastSync.toLocaleTimeString("it-IT"):"In attesa di sync…"
                :"Inserisci le credenziali Firebase nel codice per attivare"
            )
          ),
          fbConfigured&&React.createElement('button',{
            onClick:onForcSync,
            style:{background:"rgba(167,139,250,.15)",border:"1px solid rgba(167,139,250,.3)",color:"var(--purple,#a78bfa)",padding:"7px 12px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:12}
          },syncStatus==="syncing"?"…":"Sync ora")
        ),

        // WORKER CLOUDFLARE — riconoscimento foto AI
        (()=>{
          const [wUrl,setWUrl]=useState(()=>localStorage.getItem("anm_worker_url")||"");
          const [wSaved,setWSaved]=useState(!!localStorage.getItem("anm_worker_url"));
          function saveWorker(){
            const v=wUrl.trim();
            if(v){localStorage.setItem("anm_worker_url",v);setWSaved(true);}
            else{localStorage.removeItem("anm_worker_url");setWSaved(false);}
          }
          return React.createElement('div',{style:{padding:"13px 16px",borderTop:"1px solid var(--border)"}},
            React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
              React.createElement('div',{style:{width:36,height:36,borderRadius:9,flexShrink:0,
                background:wSaved?"rgba(167,139,250,.15)":"rgba(255,255,255,.05)",
                border:"1px solid "+(wSaved?"rgba(167,139,250,.3)":"var(--border2)"),
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},"🤖"),

const PIN_KEY="anm_pin_hash";
const PIN_LOCKED_KEY="anm_pin_enabled";

// Reset PIN via URL ?reset=1
if(new URLSearchParams(window.location.search).get("reset")==="1"){
  localStorage.removeItem(PIN_KEY);
  localStorage.removeItem(PIN_LOCKED_KEY);
  window.history.replaceState({},"",window.location.pathname);
}

function hashPin(pin){
  // Semplice hash deterministico (non crittografico, sufficiente per PIN locale)
  let h=0;for(let i=0;i<pin.length;i++){h=((h<<5)-h)+pin.charCodeAt(i);h|=0;}
  return ""+Math.abs(h);
}

function PinScreen({onUnlock,mode:modeProp,onCancel}){
  const [digits,setDigits]=useState([]);
  const [shake,setShake]=useState(false);
  // internalMode gestisce la transizione set→confirm internamente
  const [internalMode,setInternalMode]=useState(modeProp);
  const [firstPin,setFirstPin]=useState(null);
  const [msg,setMsg]=useState(
    modeProp==="set"?"Scegli un PIN a 4 cifre":
    modeProp==="unlock"?"Inserisci il PIN":"Conferma il PIN"
  );

  function addDigit(d){
    if(digits.length>=4)return;
    const next=[...digits,d];
    setDigits(next);
    if(next.length===4){
      setTimeout(()=>{
        if(internalMode==="unlock"){
          const saved=localStorage.getItem(PIN_KEY);
          if(hashPin(next.join(""))===saved){onUnlock();}
          else{setShake(true);setDigits([]);setTimeout(()=>setShake(false),500);setMsg("PIN errato — riprova");}
        } else if(internalMode==="set"){
          // Prima inserzione: salva e chiedi conferma
          setFirstPin(next.join(""));
          setDigits([]);
          setInternalMode("confirm");
          setMsg("Conferma il PIN — inseriscilo di nuovo");
        } else if(internalMode==="confirm"){
          if(next.join("")===firstPin){
            // Confermato: salva e sblocca
            localStorage.setItem(PIN_KEY,hashPin(next.join("")));
            localStorage.setItem(PIN_LOCKED_KEY,"1");
            onUnlock();
          } else {
            // Non coincidono: ricomincia da zero
            setShake(true);setDigits([]);setFirstPin(null);
            setInternalMode("set");
            setTimeout(()=>setShake(false),500);
            setMsg("PIN non coincide — riprova dal primo");
          }
        }
      },120);
    }
  }

  const dots=[0,1,2,3];
  return React.createElement('div',{style:{
    position:"fixed",inset:0,background:"var(--bg)",zIndex:1000,
    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
    padding:24
  }},
    // Logo
    React.createElement('div',{style:{marginBottom:32,textAlign:"center"}},
      React.createElement('div',{style:{background:"var(--anm)",color:"#0a0a0f",fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,padding:"4px 14px",borderRadius:6,display:"inline-block",marginBottom:14}},"anm"),
      React.createElement('div',{style:{fontSize:22,fontWeight:800,color:"var(--txt)",letterSpacing:"-.4px",marginBottom:6}},"Gestione Turni"),
      React.createElement('div',{style:{fontSize:13,color:"var(--txt3)"}},"🔒 "+msg)
    ),
    // Pallini PIN
    React.createElement('div',{
      style:{display:"flex",gap:16,marginBottom:40,
        animation:shake?"shake .4s":"none"},
    },
      dots.map(i=>React.createElement('div',{key:i,style:{
        width:18,height:18,borderRadius:"50%",border:"2px solid",
        borderColor:i<digits.length?"var(--anm)":"var(--border2)",
        background:i<digits.length?"var(--anm)":"transparent",
        transition:"all .12s"
      }}))
    ),
    // Tastierino
    React.createElement('div',{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,width:"100%",maxWidth:260}},
      [1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>
        React.createElement('button',{key:i,
          onClick:()=>{if(k==="⌫"){setDigits(p=>p.slice(0,-1));}else if(k!==""){addDigit(k);}},
          disabled:k==="",
          style:{
            height:72,borderRadius:16,border:"1px solid var(--border2)",
            background:k===""?"transparent":k==="⌫"?"var(--red-dim)":"var(--bg3)",
            color:k==="⌫"?"var(--red)":"var(--txt)",fontSize:k==="⌫"?20:24,
            fontWeight:700,cursor:k===""?"default":"pointer",
            fontFamily:"'Space Mono',monospace",
            opacity:k===""?0:1,
            transition:"all .1s",
            display:"flex",alignItems:"center",justifyContent:"center"
          }
        },k)
      )
    ),
    // Annulla (solo in modalità impostazione)
    modeProp!=="unlock"&&onCancel&&React.createElement('button',{
      onClick:onCancel,
      style:{marginTop:20,background:"none",border:"none",color:"var(--txt3)",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}
    },"Annulla")
  );
}

const FB_CONFIG={
  // ⚠️ INSERISCI QUI I DATI DEL TUO PROGETTO FIREBASE
  // Li trovi su: console.firebase.google.com → Il tuo progetto → Impostazioni → Configurazione web
  apiKey:"",
  projectId:"",
  databaseURL:"", // es: https://anm-operatore-default-rtdb.europe-west1.firebasedatabase.app
};
const FB_CONFIGURED=!!(FB_CONFIG.apiKey&&FB_CONFIG.projectId&&FB_CONFIG.databaseURL);

let fbDatabase=null;

async function initFirebase(){
  if(!FB_CONFIGURED)return null;
  if(fbDatabase)return fbDatabase;
  try{
    // Carica Firebase SDK dinamicamente
    if(!window.firebase){
      await Promise.all([
        new Promise((r,j)=>{const s=document.createElement("script");s.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";s.onload=r;s.onerror=j;document.head.appendChild(s);}),
      ]);
      await new Promise((r,j)=>{const s=document.createElement("script");s.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js";s.onload=r;s.onerror=j;document.head.appendChild(s);});
    }
    if(!window.firebase.apps.length) window.firebase.initializeApp(FB_CONFIG);
    fbDatabase=window.firebase.database();
    return fbDatabase;
  }catch(e){console.warn("Firebase init failed:",e);return null;}
}

async function syncToFirebase(drivers){
  if(!FB_CONFIGURED)return;
  const db=await initFirebase();
  if(!db)return;
  try{await db.ref("anm_turni/drivers").set(drivers);}
  catch(e){console.warn("Firebase write error:",e);}
}

async function loadFromFirebase(){
  if(!FB_CONFIGURED)return null;
  const db=await initFirebase();
  if(!db)return null;
  try{
    const snap=await db.ref("anm_turni/drivers").get();
    if(snap.exists()){return snap.val();}
    return null;
  }catch(e){console.warn("Firebase read error:",e);return null;}
}

function useSyncStatus(){
  const [status,setStatus]=useState(FB_CONFIGURED?"idle":"disabled"); // disabled|idle|syncing|ok|error
  return[status,setStatus];
}

function checkAndNotify(drivers){
  if(!("Notification"in window))return;
  const pending=drivers.reduce((a,d)=>a+(d.cambi||[]).filter(c=>c.status==="pending").length,0);
  if(pending===0)return;
  if(Notification.permission==="granted"){
    new Notification("ANM Turni — Cambi in sospeso",{
      body:pending===1?"C'è 1 richiesta di cambio turno in attesa di risposta.":"Ci sono "+pending+" richieste di cambio turno in attesa.",
      icon:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23f5a623'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-family='monospace' font-weight='bold'%3EA%3C/text%3E%3C/svg%3E",
      badge:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23f5a623'/%3E%3C/svg%3E",
      tag:"anm-turni-cambi",
      renotify:false,
    });
  }
}

function useNotifiche(){
  const [perm,setPerm]=useState(()=>"Notification"in window?Notification.permission:"unsupported");
  async function richiedi(){
    if(!("Notification"in window)){setPerm("unsupported");return;}
    const r=await Notification.requestPermission();
    setPerm(r);
  }
  return[perm,richiedi];
}
