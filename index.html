// ── RUBRICA VIEW ──────────────────────────────────────────────────────────────
function RubricaView(){
  const [q,setQ]=useState("");
  const [dep,setDep]=useState("Tutti");
  const DEPS=["Tutti","Cav.Aosta","Puglie","Carlo III","S.Giovanni","—"];
  const DEP_CLR={"Cav.Aosta":"#f5a623","Puglie":"#4f8ef7","Carlo III":"#3ecf8e","S.Giovanni":"#a78bfa"};

  const lista=useMemo(()=>{
    const qt=q.toLowerCase().trim();
    return RUBRICA_DATA.filter(c=>{
      const depOk=dep==="Tutti"||(dep==="—"?!c.dep:c.dep===dep);
      if(!depOk)return false;
      if(!qt)return true;
      return (c.cog+" "+c.nom).toLowerCase().includes(qt)||c.mat.includes(qt)||(c.tel||"").includes(qt);
    });
  },[q,dep]);

  function openWA(c){
    const t=(c.tel||"").replace(/\D/g,"");
    if(t) window.open("https://wa.me/39"+t,"_blank");
  }
  function callTel(c){
    const t=(c.tel||"").replace(/[^\d]/g,"");
    if(t) window.location.href="tel:+39"+t;
  }

  return React.createElement('div',{style:{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}},
    // ── Header fisso ──
    React.createElement('div',{style:{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"10px 14px 8px",flexShrink:0}},
      React.createElement('div',{style:{fontSize:15,fontWeight:800,color:"var(--txt)",marginBottom:8,letterSpacing:"-.3px"}},"📒 Rubrica ANM · "+RUBRICA_DATA.length+" contatti"),
      // Barra ricerca
      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,padding:"0 12px",marginBottom:8}},
        React.createElement('span',{style:{color:"var(--txt3)",fontSize:13}},"🔍"),
        React.createElement('input',{
          style:{flex:1,background:"none",border:"none",outline:"none",color:"var(--txt)",fontFamily:"'DM Sans',sans-serif",fontSize:13,padding:"9px 0"},
          placeholder:"Cerca nome, matricola o telefono…",
          value:q,onChange:e=>setQ(e.target.value)
        }),
        q&&React.createElement('button',{onClick:()=>setQ(""),style:{background:"none",border:"none",color:"var(--txt3)",cursor:"pointer",fontSize:16,lineHeight:1}},"✕")
      ),
      // Filtri deposito
      React.createElement('div',{style:{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}},
        DEPS.map(d=>{
          const active=dep===d;
          const col=DEP_CLR[d]||"var(--txt3)";
          return React.createElement('button',{key:d,onClick:()=>setDep(d),
            style:{padding:"4px 10px",borderRadius:20,border:"1px solid",cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:10,flexShrink:0,
              background:active?"rgba(245,166,35,.15)":"none",
              borderColor:active?"rgba(245,166,35,.45)":"var(--border2)",
              color:active?"var(--anm)":col}},
            d==="Tutti"?"Tutti ("+RUBRICA_DATA.length+")":d==="—"?"Senza dep.":d
          );
        })
      )
    ),
    // ── Contatore ──
    React.createElement('div',{style:{padding:"4px 14px",background:"var(--bg3)",borderBottom:"1px solid var(--border)",fontSize:10,color:"var(--txt3)",fontFamily:"'Space Mono',monospace",flexShrink:0}},
      lista.length+" risultati"+(q||dep!=="Tutti"?" trovati":"")
    ),
    // ── Lista scorrevole ──
    React.createElement('div',{style:{flex:1,overflowY:"auto",paddingBottom:80}},
      lista.map((c,i)=>{
        const clr=DEP_CLR[c.dep]||"#666";
        const initials=((c.cog[0]||"")+(c.nom[0]||"")).toUpperCase();
        const bgClr=["#f5a623","#4f8ef7","#3ecf8e","#a78bfa","#f75f5f","#ec4899"][parseInt(c.mat||"0")%6];
        return React.createElement('div',{key:c.mat+"_"+i,
          style:{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
            borderBottom:"1px solid var(--border)",
            background:i%2===0?"var(--bg2)":"var(--bg3)"}},
          // Avatar
          React.createElement('div',{style:{width:36,height:36,borderRadius:9,flexShrink:0,
            background:bgClr,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:12,fontWeight:800,color:"#fff",fontFamily:"'Space Mono',monospace"}},
            initials
          ),
          // Info
          React.createElement('div',{style:{flex:1,minWidth:0}},
            React.createElement('div',{style:{fontSize:13,fontWeight:700,color:"var(--txt)",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
              c.cog+" "+c.nom
            ),
            React.createElement('div',{style:{display:"flex",alignItems:"center",gap:5,marginTop:2,flexWrap:"nowrap",overflow:"hidden"}},
              React.createElement('span',{style:{fontSize:10,color:"var(--txt3)",fontFamily:"'Space Mono',monospace",flexShrink:0}},c.mat),
              c.dep&&React.createElement('span',{style:{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:4,
                background:clr+"22",border:"1px solid "+clr+"44",color:clr,flexShrink:0}},c.dep),
              c.tel&&React.createElement('span',{style:{fontSize:10,color:"var(--txt3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},c.tel)
            )
          ),
          // Azioni
          React.createElement('div',{style:{display:"flex",gap:5,flexShrink:0}},
            c.tel&&React.createElement('button',{onClick:()=>openWA(c),
              style:{width:30,height:30,borderRadius:7,background:"rgba(37,211,102,.12)",
                border:"1px solid rgba(37,211,102,.3)",color:"#25D166",cursor:"pointer",
                fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}},"💬"),
            c.tel&&React.createElement('button',{onClick:()=>callTel(c),
              style:{width:30,height:30,borderRadius:7,background:"rgba(79,142,247,.12)",
                border:"1px solid rgba(79,142,247,.3)",color:"var(--blue)",cursor:"pointer",
                fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}},"📞")
          )
        );
      }),
      lista.length===0&&React.createElement('div',{style:{textAlign:"center",padding:"60px 20px",color:"var(--txt3)"}},
        React.createElement('div',{style:{fontSize:40,marginBottom:10}},"🔍"),
        React.createElement('div',{style:{fontSize:13,fontWeight:600,color:"var(--txt2)",marginBottom:4}},"Nessun risultato"),
        React.createElement('div',{style:{fontSize:11}},"Prova con un altro nome o matricola")
      )
    )
  );
}

// APP ROOT
function App(){
  const [drivers,setDrivers]=useState(()=>initDrivers());
  const [tab,setTab]=useState("giornata");
  const [selDriver,setSelDriver]=useState(null);
  const [toast,fire]=useToast();
  const [darkMode,setDarkMode]=useState(()=>localStorage.getItem("anm_theme")!=="light");

  // ── PIN ───────────────────────────────────────────────────────────
  const pinAbilitato=!!localStorage.getItem(PIN_LOCKED_KEY);
  const [sbloccato,setSbloccato]=useState(!pinAbilitato); // se pin non impostato, app aperta
  const [showSetPin,setShowSetPin]=useState(false);

  // ── SYNC STATUS ───────────────────────────────────────────────────
  const [syncStatus,setSyncStatus]=useSyncStatus();
  const [lastSync,setLastSync]=useState(null);

  // ── NOTIFICHE ─────────────────────────────────────────────────────
  const [notifPerm,richiediNotif]=useNotifiche();

  useEffect(()=>{
    document.body.classList.toggle("light",!darkMode);
    localStorage.setItem("anm_theme",darkMode?"dark":"light");
  },[darkMode]);

  // Salva locale sempre
  useEffect(()=>{LS.set("anm_drivers_v5",drivers);},[drivers]);

  // Sync Firebase quando i dati cambiano
  useEffect(()=>{
    if(!FB_CONFIGURED||!sbloccato)return;
    setSyncStatus("syncing");
    syncToFirebase(drivers)
      .then(()=>{setSyncStatus("ok");setLastSync(new Date());})
      .catch(()=>setSyncStatus("error"));
  },[drivers,sbloccato]);

  // Carica da Firebase al primo avvio (dopo login PIN)
  useEffect(()=>{
    if(!FB_CONFIGURED||!sbloccato)return;
    setSyncStatus("syncing");
    loadFromFirebase().then(remoteData=>{
      if(remoteData&&Array.isArray(remoteData)&&remoteData.length>0){
        // Usa i dati remoti solo se più recenti/completi
        const localTurniTot=drivers.reduce((a,d)=>a+Object.keys(d.shifts||{}).length,0);
        const remoteTurniTot=remoteData.reduce((a,d)=>a+Object.keys(d.shifts||{}).length,0);
        if(remoteTurniTot>localTurniTot){
          setDrivers(remoteData);
          fire("☁️ Dati sincronizzati dal cloud!");
        }
      }
      setSyncStatus("ok");setLastSync(new Date());
    }).catch(()=>setSyncStatus("error"));
  },[sbloccato]);

  // Controlla notifiche cambi ogni volta che cambiano i driver
  useEffect(()=>{if(sbloccato)checkAndNotify(drivers);},[drivers,sbloccato]);

  useEffect(()=>{if(selDriver){const up=drivers.find(d=>d.id===selDriver.id);if(up)setSelDriver(up);}},[drivers]);

  function updateDriver(updated){setDrivers(ds=>ds.map(d=>d.id===updated.id?updated:d));}
  function addDriver(d){setDrivers(ds=>[...ds,d]);}
  function editDriver(updated){setDrivers(ds=>ds.map(d=>d.id===updated.id?{...d,mat:updated.mat,tipo:updated.tipo}:d));}
  function deleteDriver(id){setDrivers(ds=>ds.filter(d=>d.id!==id));}

  const totalPending=useMemo(()=>drivers.reduce((a,d)=>a+(d.cambi||[]).filter(c=>c.status==="pending").length,0),[drivers]);

  // ── PIN: schermata blocco ─────────────────────────────────────────
  if(!sbloccato){
    return React.createElement(PinScreen,{
      mode:"unlock",
      onUnlock:()=>setSbloccato(true)
    });
  }

  // ── PIN: impostazione nuovo PIN ───────────────────────────────────
  if(showSetPin){
    return React.createElement(PinScreen,{
      mode:"set",
      onUnlock:()=>{setShowSetPin(false);fire("🔒 PIN impostato!");},
      onCancel:()=>setShowSetPin(false)
    });
  }

  if(selDriver){
    const live=drivers.find(d=>d.id===selDriver.id)||selDriver;
    return React.createElement('div',{className:"app"},
      React.createElement(DriverDetail,{driver:live,onBack:()=>setSelDriver(null),onUpdate:updateDriver,fire}),
      React.createElement('div',{className:"toast"+(toast.on?" on":"")},toast.msg)
    );
  }

  // Badge stato sync
  const SyncBadge=()=>!FB_CONFIGURED?null:React.createElement('div',{
    title:lastSync?"Ultimo sync: "+lastSync.toLocaleTimeString():"In sincronizzazione…",
    style:{display:"flex",alignItems:"center",gap:4,fontSize:10,
      color:syncStatus==="ok"?"var(--green)":syncStatus==="error"?"var(--red)":"var(--txt3)",
      fontFamily:"'Space Mono',monospace",cursor:"default"}
  },
    syncStatus==="syncing"?"⏳":syncStatus==="ok"?"☁️✓":syncStatus==="error"?"☁️✗":"☁️",
    syncStatus==="ok"&&React.createElement('span',null,"sync")
  );

  return React.createElement('div',{className:"app"},
    // ── HEADER ────────────────────────────────────────────────────
    React.createElement('div',{className:"hdr"},
      React.createElement('span',{className:"logo-badge"},"anm"),
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:14,fontWeight:700,color:"var(--txt)",letterSpacing:"-.3px"}},"Gestione Turni"),
        React.createElement('div',{style:{fontSize:10,color:"var(--txt3)",fontFamily:"'Space Mono',monospace"}},"Napoli · Admin")
      ),
      React.createElement('div',{className:"hdr-spacer"}),
      React.createElement(SyncBadge,null),
      React.createElement('button',{
        onClick:()=>setDarkMode(p=>!p),
        style:{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,
          width:32,height:32,cursor:"pointer",display:"flex",alignItems:"center",
          justifyContent:"center",fontSize:16,flexShrink:0}},
        darkMode?"☀️":"🌙"
      ),
      // Pulsante PIN nell'header
      React.createElement('button',{
        onClick:()=>setShowSetPin(true),
        title:"Impostazioni PIN",
        style:{background:pinAbilitato?"rgba(62,207,142,.12)":"var(--bg3)",
          border:"1px solid "+(pinAbilitato?"rgba(62,207,142,.3)":"var(--border2)"),
          borderRadius:8,width:32,height:32,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}},
        pinAbilitato?"🔒":"🔓"
      ),
      React.createElement('div',{className:"hdr-count"},drivers.length+" autisti")
    ),

    // ── CONTENUTO ─────────────────────────────────────────────────
    tab==="giornata"&&React.createElement('div',{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}},
      React.createElement(GiornataView,{
        drivers,
        onSelectDriver:d=>{setSelDriver(d);},
        fire
      })
    ),
    tab==="autisti"&&React.createElement(DriversView,{
      drivers,
      onSelect:d=>setSelDriver(d),
      onAdd:addDriver,
      onEdit:editDriver,
      onDelete:deleteDriver,
      fire
    }),
    tab==="cambi"&&React.createElement(CambiGlobali,{drivers,onUpdateDriver:updateDriver,fire}),
    tab==="rubrica"&&React.createElement(RubricaView,null),
    tab==="guida"&&React.createElement(GuidaView,{
      pinAbilitato,
      onSetPin:()=>setShowSetPin(true),
      onRemovePin:()=>{localStorage.removeItem(PIN_KEY);localStorage.removeItem(PIN_LOCKED_KEY);fire("🔓 PIN rimosso");},
      syncStatus,lastSync,
      notifPerm,richiediNotif,
      fbConfigured:FB_CONFIGURED,
      onForcSync:()=>{setSyncStatus("syncing");syncToFirebase(drivers).then(()=>{setSyncStatus("ok");setLastSync(new Date());fire("☁️ Sincronizzato!");}).catch(()=>{setSyncStatus("error");fire("❌ Errore sync");});},
      onBackup:()=>{
        const blob=new Blob([JSON.stringify({version:"anm-v5",ts:new Date().toISOString(),drivers},null,2)],{type:"application/json"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;
        a.download="anm-backup-"+new Date().toISOString().slice(0,10)+".json";
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        URL.revokeObjectURL(url);fire("✅ Backup scaricato!");
      },
      onRestore:(file)=>{
        const reader=new FileReader();
        reader.onload=e=>{
          try{
            const d=JSON.parse(e.target.result);
            if(d.drivers&&Array.isArray(d.drivers)&&d.drivers.length>0){
              setDrivers(d.drivers);fire("✅ Ripristino OK: "+d.drivers.length+" autisti");

      React.createElement('div',{className:"btab",

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){if(this.state.err)return React.createElement('div',{style:{padding:20,color:"#f75f5f",fontFamily:"monospace",fontSize:12,background:"#0a0a0f",minHeight:"100vh",whiteSpace:"pre-wrap"}},"Errore: "+this.state.err.message);return this.props.children;}
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
